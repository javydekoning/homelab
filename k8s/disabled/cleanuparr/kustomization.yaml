apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dvr

resources:
  - ../../base/

images:
  - name: app
    newName: ghcr.io/cleanuparr/cleanuparr
    newTag: latest@sha256:9e0de69a07d47edc6de9ffa629751112db68af54c26c5d384ca3370365b1ce8a

configMapGenerator:
  - name: env-configmap
    literals:
      - PUID=911
      - PGID=911
      - TZ=Europe/Amsterdam
      - PORT=11011

namePrefix: cleanuparr-

labels:
  - includeSelectors: true
    pairs:
      app: cleanuparr

patches:
  - path: deployment-patch.yaml
  - path: service-patch.yaml
  - path: ingress-patch.yaml
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/name
        value: cleanuparr
    target:
      kind: Deployment
      name: deployment
