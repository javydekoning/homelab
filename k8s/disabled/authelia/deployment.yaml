apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: authelia
  name: authelia
  namespace: authelia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authelia
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: authelia
    spec:
      enableServiceLinks: false
      initContainers:
        - name: copy-config
          image: busybox:latest@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
          command:
            - sh
            - -c
            - |
              cp /config-source/authelia.yml /config/authelia.yml
              chmod 644 /config/authelia.yml
              cat /config-source/authelia.yml
              cat /config/authelia.yml
          volumeMounts:
            - mountPath: /config-source
              name: authelia-config
              readOnly: true
            - mountPath: /config
              name: authelia-data
      containers:
        - name: authelia
          image: ghcr.io/authelia/authelia:latest@sha256:0c824dcab1ae97c56bf673c5e77fe8cc6bcd400564555140cc8002a12c6b6463
          imagePullPolicy: IfNotPresent
          env:
            - name: X_AUTHELIA_CONFIG
              value: "/config/authelia.yml,/secrets/secrets.yml"
            - name: X_AUTHELIA_CONFIG_FILTERS
              value: "template"
          ports:
            - containerPort: 9091
              name: http
              protocol: TCP
          volumeMounts:
            - mountPath: /config
              name: authelia-data
            - mountPath: /secrets
              name: authelia-secrets
              readOnly: true
      restartPolicy: Always
      volumes:
        - configMap:
            defaultMode: 420
            name: authelia-config
          name: authelia-config
        - hostPath:
            path: /config/authelia
            type: DirectoryOrCreate
          name: authelia-data
        - secret:
            secretName: authelia-credentials
          name: authelia-secrets
