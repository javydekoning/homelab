apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: zigbee2mqtt-alerts
  namespace: smarthome
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: zigbee2mqtt.rules
      rules:
        - alert: ZigbeeDeviceOffline
          expr: zigbee2mqtt_device_up == 0
          for: 10m
          labels:
            severity: warning
            service: zigbee2mqtt
          annotations:
            summary: "📡 Zigbee device offline: {{ $labels.device }}"
            description: |
              🔌 Zigbee Device Offline
              - ⏰ Duration: > 10 minutes
              - Device: {{ $labels.device }}
        - alert: ZigbeeDeviceOTAAvailable
          expr: zigbee2mqtt_device_ota_update_available == 1
          for: 1h
          labels:
            severity: info
            service: zigbee2mqtt
          annotations:
            summary: "🔄 OTA update available: {{ $labels.device }}"
            description: |
              📦 Zigbee Device OTA Update
              - Device: {{ $labels.device }}
