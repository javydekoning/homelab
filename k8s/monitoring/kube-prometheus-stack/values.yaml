defaultRules:
  disabled:
    NodeMemoryMajorPagesFaults: true
    NodeMemoryHighUtilization: true
  rules:
    # Disable KubeSchedulerDown, KubeProxyDown, KubeControllerManagerDown
    # because running in k3s
    kubeControllerManager: false
    kubeProxy: false
    kubeSchedulerAlerting: false
kubeProxy:
  enabled: false
kubeControllerManager:
  enabled: false

alertmanager:
  config:
    receivers:
      - name: "null"
      - name: default
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/telegram-bot-token/token.txt
            chat_id: -5135920065
            parse_mode: 'HTML'
            message: |-
              {{ define "telegram.homelab.message" -}}
              {{- if gt (len .Alerts.Firing) 0 -}}
              🔥 <b>Firing ({{ len .Alerts.Firing }})</b>
              {{ range .Alerts.Firing -}}
              • <b>{{ .Labels.alertname }}</b>{{ if .Labels.severity }} [{{ .Labels.severity }}]{{ end }}{{ if .Labels.namespace }} — {{ .Labels.namespace }}{{ end }}
              {{- if .Annotations.summary }}
                {{ .Annotations.summary }}{{ end }}
              {{ end -}}
              {{- end -}}
              {{- if gt (len .Alerts.Resolved) 0 -}}
              ✅ <b>Resolved ({{ len .Alerts.Resolved }})</b>
              {{ range .Alerts.Resolved -}}
              • <b>{{ .Labels.alertname }}</b>{{ if .Labels.namespace }} — {{ .Labels.namespace }}{{ end }}
              {{ end -}}
              {{- end -}}
              {{- end -}}
              {{ template "telegram.homelab.message" . }}
    route:
      receiver: default
      routes:
        - receiver: "null"
          matchers:
            - alertname =~ "InfoInhibitor|Watchdog"

  alertmanagerSpec:
    # Secrets is a list of Secrets in the same namespace as the Alertmanager object, which shall be mounted into the
    # Alertmanager Pods. The Secrets are mounted into /etc/alertmanager/secrets/.
    #
    secrets:
      - telegram-bot-token
    # Use emptyDir for Alertmanager state storage.
    # S3 FUSE (aws-s3-csi-driver) does not support atomic rename, which causes
    # nflog/silences maintenance to fail with "function not implemented".
    # emptyDir is sufficient for a homelab; silences/notification-log are lost
    # on pod restart but that is an acceptable trade-off.
    storage: {}

  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - alertmanager.k8s.javydekoning.com
    paths:
      - /
    tls:
      - hosts:
          - alertmanager.k8s.javydekoning.com

grafana:
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - grafana.k8s.javydekoning.com
    paths:
      - /
    tls:
      - hosts:
          - grafana.k8s.javydekoning.com

  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: "http://loki:3100"
      isDefault: false
      editable: true

prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
  ingress:
    enabled: true
    ingressClassName: traefik
    hosts:
      - prometheus.k8s.javydekoning.com
    paths:
      - /
    tls:
      - hosts:
          - prometheus.k8s.javydekoning.com

prometheusOperator:
  admissionWebhooks:
    enabled: false
  tls:
    enabled: false

prometheus-node-exporter:
  hostRootFsMount:
    enabled: false
