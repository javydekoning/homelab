apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: external-nutritrace-secret
  namespace: nutritrace
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: nutritrace-credentials
    template:
      engineVersion: v2
      data:
        AI_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
        JWT_SECRET: "{{ .JWT_SECRET }}"
  dataFrom:
    - extract:
        key: k8s-homelab-secrets
        property: litellm
    - extract:
        key: k8s-homelab-secrets
        property: nutritrace
